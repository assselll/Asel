<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель новостей</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Админ-панель</h1>
        <div>
            <button class="btn" id="toggleAddFormBtn">Добавить новость</button>
            <button class="btn danger" id="resetBtn">Сбросить к начальным</button>
        </div>
    </header>

    <div class="container">
        <div class="add-form" id="addForm">
            <h2 id="formTitle">Новая публикация</h2>
            <form id="newsForm">
                <input type="hidden" id="editId" value="">
                <div class="form-group">
                    <label for="title">Заголовок</label>
                    <input type="text" id="title" required>
                </div>
                <div class="form-group">
                    <label for="category">Категория</label>
                    <select id="category" required>
                        <option value="gossip">Сплетни</option>
                        <option value="tech">Технологии</option>
                        <option value="politics">Политика</option>
                        <option value="sport">Спорт</option>
                        <option value="culture">Культура</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="text">Текст новости</label>
                    <textarea id="text" required></textarea>
                </div>
                <div class="form-group">
                    <label for="author">Автор</label>
                    <input type="text" id="author" required>
                </div>
                <button type="submit" class="btn">💾 Сохранить</button>
                <button type="button" class="btn danger" id="cancelFormBtn">Отмена</button>
            </form>
        </div>
        <h2>Все новости</h2>
        <div class="admin-news-list" id="adminNewsList"></div>
    </div>

    <script src="script_admin.js"></script>
</body>
</html>
