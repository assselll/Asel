<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель управления новостями</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="container">
        <nav>
            <div class="logo">ADMIN PANEL</div>
            <a href="index.html" style="color: white; text-decoration: none;">На сайт</a>
        </nav>
    </div>
</header>

<div class="container">
    <!-- Секция добавления/редактирования -->
    <div class="card" id="form-container">
        <h2 id="form-title">Добавить новую новость</h2>
        <form class="admin-form">
            <input type="hidden" id="news-id">
            <label for="title">Заголовок новости</label>
            <input type="text" id="title" placeholder="Введите заголовок...">
            
            <label for="category">Категория</label>
            <select id="category">
                <option value="politics">Политика</option>
                <option value="tech">Технологии</option>
                <option value="culture">Культура</option>
            </select>
            
            <label for="content">Текст новости</label>
            <textarea id="content" rows="6" placeholder="Напишите основной текст..."></textarea>
            
            <div class="btn-group">
                <button type="submit" id="save-btn">Опубликовать</button>
                <button type="button" class="edit-btn hidden" id="cancel-btn" style="display:none;">Отмена</button>
            </div>
        </form>
    </div>

    <!-- Список новостей для управления -->
    <div class="card">
        <h2>Управление новостями</h2>
        <table class="news-table">
            <thead>
                <tr>
                    <th>Дата</th>
                    <th>Заголовок</th>
                    <th>Категория</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody id="news-list">
                <!-- Пример одной строки новости -->
                <tr>
                    <td>12.05.2024</td>
                    <td><strong>Запуск новой платформы</strong></td>
                    <td><span class="status-badge">Технологии</span></td>
                    <td>
                        <div class="btn-group">
                            <button class="edit-btn">Редактировать</button>
                            <button class="delete-btn">Удалить</button>
                        </div>
                    </td>
                </tr>
                <tr>
                    <td>10.05.2024</td>
                    <td><strong>Обновление дизайна</strong></td>
                    <td><span class="status-badge">Дизайн</span></td>
                    <td>
                        <div class="btn-group">
                            <button class="edit-btn">Редактировать</button>
                            <button class="delete-btn">Удалить</button>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
<script src="admin.js"></script>
<script src="script_admin.js"></script>
    <script src="script_reader.js"></script>
</body>
</html>
